version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MODEL_PATH=/app/models/trained_model/model.pkl
      - PREPROCESSOR_PATH=/app/models/preprocessing/preprocessor.pkl
      - BACKEND_PORT=8000
      - BACKEND_HOST=0.0.0.0
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./models:/app/models
      - ./backend:/app
    depends_on:
      - frontend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  models:
